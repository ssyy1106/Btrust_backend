version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy   # ✅ 等待数据库健康再启动
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Btrust123@db:5432/stock  # ✅ 注意协议是 asyncpg
    networks:
      - backend

  db:
    image: postgres:15
    container_name: fastapi_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Btrust123
      POSTGRES_DB: stock
    ports:
      - "5438:5432"  # 外部访问用 5438，容器内部仍用 5432
    networks:
      - backend
    healthcheck:   # ✅ 加上 PostgreSQL 健康检查
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: fastapi_nginx
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
