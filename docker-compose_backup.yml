version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: apppass
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    volumes:
      - minio_data:/data
    networks:
      - backend
    restart: unless-stopped

  celery_worker:
    # 方式A：你有 Dockerfile，就用 build（推荐）
    build:
      context: ./worker
    container_name: celery_worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      # RabbitMQ
      CELERY_BROKER_URL: amqp://app:apppass@rabbitmq:5672//
      # 结果后端（可选）：你如果不用 celery backend，可删掉
      CELERY_RESULT_BACKEND: rpc://

      # MinIO（S3兼容）
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123456
      S3_BUCKET: jobs

      # 连接宿主机 PostgreSQL（Windows Docker Desktop 通常可用 host.docker.internal）
      DATABASE_URL: postgresql+psycopg://postgres:Btrust123@host.docker.internal:5432/stock

      # 可选：给你的应用一些环境
      TZ: America/Montreal
    extra_hosts:
      # 有些环境需要显式映射，保守起见加上
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: unless-stopped

    # ↓↓↓ 关键：这里按你的 Celery app 路径改
    # 假设你的 celery_app 在 app/celery_app.py，实例名 celery_app
    command: >
      celery -A app.celery_app:celery_app worker
      -l INFO
      --concurrency=4
      -Q default

    # 如果你想在本机改代码后容器自动生效（开发用），可把代码挂进去：
    # volumes:
    #   - ./worker:/app

  flower:
    image: mher/flower:2.0
    container_name: flower
    depends_on:
      - rabbitmq
    environment:
      CELERY_BROKER_URL: amqp://app:apppass@rabbitmq:5672//
      TZ: America/Montreal
    ports:
      - "5555:5555"
    networks:
      - backend
    restart: unless-stopped
    # 可选：加 basic auth（建议你至少在内网也加一下）
    # command: >
    #   celery --broker=amqp://app:apppass@rabbitmq:5672// flower
    #   --port=5555
    #   --basic_auth=admin:admin123

    # 想“可选启用”Flower：用 profile（docker compose --profile monitor up）
    profiles: ["monitor"]

networks:
  backend:
    name: backend

volumes:
  rabbitmq_data:
  minio_data:
